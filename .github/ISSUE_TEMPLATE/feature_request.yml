name: Feature request
description: Suggest an improvement or new capability
title: "[Enhancement] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What frustration or missing capability led to this idea?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Be as concrete as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Did you try a workaround? Is there another way to achieve the same outcome?

  - type: textarea
    id: extra
    attributes:
      label: Anything else
